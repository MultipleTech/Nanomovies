name: Fetch Nanoflix Playlist JSON

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # ၁။ Repository ထဲက Code တွေကို ဆွဲယူမယ်
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ၂။ Python Environment အသင့်ပြင်မယ် (ဒီနေရာကို setup-python လို့ ပြင်ထားပါတယ်)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ၃။ လိုအပ်တဲ့ Requests Library ကို သွင်းမယ်
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # ၄။ Python Script ကို Run မယ်
    - name: Run Playlist Extractor
      run: python main.py

    # ၅။ ထွက်လာတဲ့ JSON ကို Repository ထဲ ပြန်ပြီး Auto Commit / Push လုပ်မယ်
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add playlist_output.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update: Nanoflix Playlist JSON [skip ci]" && git push)
        

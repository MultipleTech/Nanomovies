name: Fetch Nanoflix Movies Data

on:
  workflow_dispatch:

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Movie Scraper
      run: python scrape_movies.py

    - name: Commit and Push JSON Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add movies_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update: Filtered Movies Dataset [skip ci]" && git push)
        

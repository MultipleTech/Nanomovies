name: Nanoflix Scraper

on:
  schedule:
    # နေ့စဉ် မြန်မာစံတော်ချိန် မနက် ၆:၃၀ (UTC 00:00) တွင် Auto Run မည်
    - cron: '0 0 * * *'
  workflow_dispatch: # Actions Tab မှ သီးသန့် အချိန်မရွေး နှိပ် Run နိုင်သည်
  push:
    branches:
      - main
    # JSON ဖိုင်များ နှင့် README စသည်တို့ကို Manual ပြင်ပြီး Push လုပ်ပါက Workflow ကို မ Run စေရန် တားဆီးခြင်း
    paths-ignore:
      - 'nanoflix_movies.json'
      - 'nanoflix_tv_shows.json'
      - '**.md'

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Scraper
        run: node index.js

      - name: Commit and Push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # JSON ဖိုင်များကိုသာ သီးသန့် Stage လုပ်မည်
          git add nanoflix_movies.json nanoflix_tv_shows.json 2>/dev/null || true
          
          # JSON ဖိုင်များထဲတွင် ပြောင်းလဲမှု (Update) ရှိမှသာ Commit & Push လုပ်မည်
          if [ -n "$(git status --porcelain nanoflix_movies.json nanoflix_tv_shows.json)" ]; then
            git commit -m "chore: auto-update scraped movie/tv data [skip ci]"
            git push
            echo "✅ Data အသစ်များကို GitHub သို့ Commit & Push လုပ်ပြီးပါပြီ။"
          else
            echo "ℹ️ JSON ဖိုင်များတွင် ပြောင်းလဲမှု မရှိသေးပါ။"
          fi
          

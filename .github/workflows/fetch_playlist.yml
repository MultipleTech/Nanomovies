name: Nanoflix Scraper

on:
  schedule:
    # Runs daily at 00:00 UTC (Adjust cron schedule as needed)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches:
      - main

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    # Grant write permission to commit updated JSON files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Scraper
        run: node index.js # Ensure your JS file is named index.js (or update this name)

      - name: Commit and Push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nanoflix_movies.json nanoflix_tv_shows.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update scraped movie/tv data [skip ci]" && git push)
          

name: Enrich Movie Descriptions

on:
  schedule:
    # နေ့စဉ် မနက် ၇:၀၀ (Scraper ပြီးစီးပြီးနောက် အလိုအလျောက် Run မည်)
    - cron: '30 0 * * *'
  workflow_dispatch: # Actions Tab မှ Manual နှိပ် Run နိုင်သည်

jobs:
  enrich-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Description Enricher
        run: python enrich_description.py

      - name: Commit and Push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add nanoflix_movies.json 2>/dev/null || true
          
          if [ -n "$(git status --porcelain nanoflix_movies.json)" ]; then
            git commit -m "chore: auto-enrich missing movie descriptions from cinemm [skip ci]"
            git push
            echo "✅ Description အသစ်များဖြည့်စွက်ပြီး Commit & Push လုပ်ပြီးပါပြီ။"
          else
            echo "ℹ️ ဖြည့်စွက်ရန် Description အသစ် မရှိပါ။"
          fi
